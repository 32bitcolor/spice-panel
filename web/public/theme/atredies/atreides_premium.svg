<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256" role="img" aria-labelledby="title desc">
  <title id="title">Atreides Premium Badge</title>
  <desc id="desc">Transparent sci-fi rewards premium badge with noble octagonal frame, central star, deep green, sage, and muted gold heraldic geometry.</desc>
  <defs>
    <linearGradient id="gold" x1="48" y1="28" x2="208" y2="228" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f3d989"/>
      <stop offset="0.36" stop-color="#b8953d"/>
      <stop offset="0.7" stop-color="#e1c46c"/>
      <stop offset="1" stop-color="#806421"/>
    </linearGradient>
    <linearGradient id="goldSoft" x1="80" y1="56" x2="176" y2="206" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffe9a3"/>
      <stop offset="0.5" stop-color="#d2ad4f"/>
      <stop offset="1" stop-color="#8c6f26"/>
    </linearGradient>
    <linearGradient id="green" x1="64" y1="36" x2="198" y2="222" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#173b28"/>
      <stop offset="0.58" stop-color="#0e2f22"/>
      <stop offset="1" stop-color="#071f18"/>
    </linearGradient>
    <linearGradient id="sage" x1="58" y1="82" x2="198" y2="218" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#c4c999"/>
      <stop offset="0.56" stop-color="#7f8e62"/>
      <stop offset="1" stop-color="#455c3f"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="2.2" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <path id="oct" d="M128 10 L199 39 L246 110 L246 146 L199 217 L128 246 L57 217 L10 146 L10 110 L57 39 Z"/>
  </defs>

  <g filter="url(#shadow)">
    <use href="#oct" fill="url(#gold)"/>
    <path d="M128 23 L190 48 L232 112 L232 144 L190 208 L128 233 L66 208 L24 144 L24 112 L66 48 Z" fill="#102f21"/>
    <path d="M128 31 L184 54 L222 114 L222 142 L184 202 L128 225 L72 202 L34 142 L34 114 L72 54 Z" fill="none" stroke="url(#goldSoft)" stroke-width="5"/>
    <path d="M128 43 L176 63 L209 116 L209 140 L176 193 L128 213 L80 193 L47 140 L47 116 L80 63 Z" fill="url(#green)" stroke="#92a06b" stroke-width="4"/>
    <path d="M128 52 L170 69 L199 118 L199 138 L170 187 L128 204 L86 187 L57 138 L57 118 L86 69 Z" fill="none" stroke="#d1b45c" stroke-width="1.8" opacity="0.9"/>

    <!-- outer military-heraldic bars -->
    <g fill="none" stroke="#d8bd61" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" opacity="0.95">
      <path d="M53 94 L53 78 L76 59"/>
      <path d="M203 94 L203 78 L180 59"/>
      <path d="M53 162 L53 178 L76 197"/>
      <path d="M203 162 L203 178 L180 197"/>
      <path d="M78 48 H112" opacity="0.8"/>
      <path d="M144 48 H178" opacity="0.8"/>
      <path d="M78 208 H112" opacity="0.8"/>
      <path d="M144 208 H178" opacity="0.8"/>
    </g>

    <!-- side and cardinal gold caps -->
    <g fill="url(#goldSoft)" stroke="#6f551b" stroke-width="1.5">
      <path d="M118 20 L128 10 L138 20 L138 42 L128 52 L118 42 Z"/>
      <path d="M118 214 L128 204 L138 214 L138 236 L128 246 L118 236 Z"/>
      <path d="M20 118 L10 128 L20 138 L42 138 L52 128 L42 118 Z"/>
      <path d="M236 118 L246 128 L236 138 L214 138 L204 128 L214 118 Z"/>
      <rect x="56" y="56" width="14" height="14" transform="rotate(0 63 63)"/>
      <rect x="186" y="56" width="14" height="14"/>
      <rect x="56" y="186" width="14" height="14"/>
      <rect x="186" y="186" width="14" height="14"/>
    </g>

    <!-- circular honor ring -->
    <g fill="none" stroke="url(#goldSoft)" stroke-width="3" stroke-linecap="round">
      <path d="M69 115 A61 61 0 0 1 119 68"/>
      <path d="M137 68 A61 61 0 0 1 187 115"/>
      <path d="M187 141 A61 61 0 0 1 137 188"/>
      <path d="M119 188 A61 61 0 0 1 69 141"/>
    </g>

    <!-- central faceted star -->
    <g stroke="#6f551b" stroke-width="1.25" stroke-linejoin="round">
      <path d="M128 54 L138 112 L128 128 L118 112 Z" fill="#ffe9a3"/>
      <path d="M202 128 L144 138 L128 128 L144 118 Z" fill="#d0ab4a"/>
      <path d="M128 202 L118 144 L128 128 L138 144 Z" fill="#a78634"/>
      <path d="M54 128 L112 118 L128 128 L112 138 Z" fill="#edcf72"/>
      <path d="M181 75 L144 118 L128 128 L138 112 Z" fill="#f3d989"/>
      <path d="M181 181 L138 144 L128 128 L144 138 Z" fill="#967628"/>
      <path d="M75 181 L112 138 L128 128 L118 144 Z" fill="#c49c3e"/>
      <path d="M75 75 L118 112 L128 128 L112 118 Z" fill="#f6dea0"/>
