    </g>

    <!-- sage protective laurel / wing geometry -->
    <g fill="url(#sage)" stroke="#d4bf6a" stroke-width="1.6" stroke-linejoin="round">
      <path d="M65 147 C78 178 98 197 124 208 C104 182 89 158 82 132 C78 146 72 151 65 147 Z"/>
      <path d="M191 147 C178 178 158 197 132 208 C152 182 167 158 174 132 C178 146 184 151 191 147 Z"/>
      <path d="M81 177 C94 190 106 198 121 204 L103 181 Z" fill="#536b47"/>
      <path d="M175 177 C162 190 150 198 135 204 L153 181 Z" fill="#536b47"/>
      <path d="M101 205 L128 222 L155 205 L145 226 L128 238 L111 226 Z" fill="#2f5135"/>
      <path d="M128 198 L137 224 L128 238 L119 224 Z" fill="url(#goldSoft)"/>
    </g>

    <!-- subtle inner highlights -->
    <g fill="none" stroke="#f1d984" stroke-width="1" opacity="0.5">
      <path d="M40 118 L40 112 L75 59"/>
      <path d="M216 118 L216 112 L181 59"/>
      <path d="M40 138 L40 144 L75 197"/>
      <path d="M216 138 L216 144 L181 197"/>
