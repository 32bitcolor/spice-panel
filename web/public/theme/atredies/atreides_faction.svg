    <path d="M97 148L52 132L70 158L112 165Z"/>
    <path d="M109 168L72 160L92 183L121 181Z"/>
    <path d="M175 95L220 59L213 102L166 132Z"/>
    <path d="M169 125L217 101L206 132L155 150Z"/>
    <path d="M159 148L204 132L186 158L144 165Z"/>
