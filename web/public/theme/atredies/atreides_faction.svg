<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" fill="none" role="img" aria-label="Atreides inspired noble hawk faction crest">
  <defs>
    <linearGradient id="gold" x1="50" y1="20" x2="206" y2="230" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F2D98A"/>
      <stop offset="0.42" stop-color="#B8943F"/>
      <stop offset="1" stop-color="#7B5F25"/>
    </linearGradient>
    <linearGradient id="goldHi" x1="80" y1="32" x2="174" y2="204" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFF0B8"/>
      <stop offset="1" stop-color="#B28A34"/>
    </linearGradient>
    <linearGradient id="green" x1="128" y1="42" x2="128" y2="228" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#284331"/>
      <stop offset="1" stop-color="#10281F"/>
    </linearGradient>
    <linearGradient id="sage" x1="45" y1="80" x2="212" y2="204" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#87966D"/>
      <stop offset="1" stop-color="#4C6043"/>
    </linearGradient>
    <linearGradient id="dark" x1="128" y1="50" x2="128" y2="214" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1B3828"/>
      <stop offset="1" stop-color="#0A1E18"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="3" stdDeviation="2.2" flood-color="#06120D" flood-opacity="0.35"/>
    </filter>
  </defs>

