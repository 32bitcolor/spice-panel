<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">Atreides Faceted Gem Reward Icon</title>
  <desc id="desc">A transparent sci-fi rewards icon showing a faceted green gemstone framed in muted gold heraldic geometry.</desc>
  <defs>
    <linearGradient id="gold" x1="54" y1="18" x2="202" y2="238" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f2dc84"/>
      <stop offset="0.36" stop-color="#b99a39"/>
      <stop offset="0.72" stop-color="#d5bd61"/>
      <stop offset="1" stop-color="#7f691d"/>
    </linearGradient>
    <linearGradient id="goldDark" x1="58" y1="24" x2="194" y2="226" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#866d21"/>
      <stop offset="1" stop-color="#3e3515"/>
    </linearGradient>
    <linearGradient id="gemBase" x1="82" y1="36" x2="174" y2="219" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#9fc496"/>
      <stop offset="0.34" stop-color="#3d7b4d"/>
      <stop offset="0.74" stop-color="#17472b"/>
      <stop offset="1" stop-color="#082918"/>
    </linearGradient>
    <linearGradient id="sage" x1="94" y1="50" x2="142" y2="144" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#e6f1c7" stop-opacity="0.92"/>
      <stop offset="1" stop-color="#a5c791" stop-opacity="0.32"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="3" flood-color="#07130b" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Outer heraldic frame -->
  <g filter="url(#softShadow)">
    <path d="M128 14 151 47 204 72 197 129 222 170 181 188 160 232 128 244 96 232 75 188 34 170 59 129 52 72 105 47Z" fill="url(#gold)"/>
    <path d="M128 31 144 56 188 78 181 130 199 160 166 174 148 215 128 225 108 215 90 174 57 160 75 130 68 78 112 56Z" fill="#0d321e"/>
    <path d="M128 39 140 62 176 83 168 133 185 153 156 166 140 202 128 214 116 202 100 166 71 153 88 133 80 83 116 62Z" fill="url(#goldDark)" opacity="0.72"/>
  </g>

  <!-- Side protective plates -->
  <g opacity="0.98">
    <path d="M45 104 70 121 83 173 62 187 47 149Z" fill="url(#gold)"/>
    <path d="M211 104 186 121 173 173 194 187 209 149Z" fill="url(#gold)"/>
    <path d="M58 126 72 137 79 166 66 174 57 147Z" fill="#123b24"/>
    <path d="M198 126 184 137 177 166 190 174 199 147Z" fill="#123b24"/>
    <path d="M58 120 80 135" stroke="#f3df87" stroke-width="2" stroke-linecap="round" opacity="0.65"/>
    <path d="M198 120 176 135" stroke="#f3df87" stroke-width="2" stroke-linecap="round" opacity="0.65"/>
  </g>

  <!-- Central gemstone silhouette -->
  <g>
    <path d="M128 45 174 76 164 158 128 219 92 158 82 76Z" fill="url(#gemBase)" stroke="#c6d89f" stroke-width="2" stroke-linejoin="round"/>
    <path d="M128 45 118 112 82 76Z" fill="#c9dfad" opacity="0.72"/>
    <path d="M128 45 138 112 174 76Z" fill="#6fa165" opacity="0.62"/>
    <path d="M82 76 118 112 92 158Z" fill="#76a96e" opacity="0.48"/>
    <path d="M174 76 138 112 164 158Z" fill="#245b37" opacity="0.7"/>
    <path d="M118 112 128 219 92 158Z" fill="#235f37" opacity="0.85"/>
    <path d="M138 112 128 219 164 158Z" fill="#0f3d25" opacity="0.82"/>
    <path d="M118 112 138 112 128 219Z" fill="#4d8952" opacity="0.72"/>
    <path d="M128 45 118 112 138 112Z" fill="#9bbb80" opacity="0.7"/>
    <path d="M94 79 117 101 89 92Z" fill="#eef7d2" opacity="0.7"/>
    <path d="M162 80 139 101 168 92Z" fill="#d6e8bd" opacity="0.38"/>
  </g>

  <!-- Facet lines -->
  <g fill="none" stroke-linejoin="round" stroke-linecap="round">
    <path d="M128 45 128 219" stroke="#d9ecc1" stroke-width="1.6" opacity="0.65"/>
    <path d="M82 76 118 112 128 219 138 112 174 76" stroke="#cfe6ad" stroke-width="1.15" opacity="0.58"/>
    <path d="M92 158 118 112 138 112 164 158" stroke="#b9d39e" stroke-width="1.1" opacity="0.45"/>
    <path d="M104 61 118 112 92 158" stroke="#eff8d6" stroke-width="0.9" opacity="0.35"/>
    <path d="M152 61 138 112 164 158" stroke="#eff8d6" stroke-width="0.9" opacity="0.28"/>
  </g>

  <!-- Top noble crest -->
  <g>
    <path d="M128 14 151 47 136 66 128 97 120 66 105 47Z" fill="url(#gold)"/>
    <path d="M128 28 138 49 130 63 128 83 126 63 118 49Z" fill="#102f1d" opacity="0.9"/>
    <path d="M128 22 128 65" stroke="#fff1a5" stroke-width="1.4" opacity="0.72"/>
    <path d="M112 47 128 56 144 47" fill="none" stroke="#80681f" stroke-width="1.6" opacity="0.55"/>
  </g>

  <!-- Gold bevel highlights -->
  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M63 78 106 57 128 23" stroke="#fff0a0" stroke-width="2" opacity="0.62"/>
    <path d="M193 78 150 57 128 23" stroke="#fff0a0" stroke-width="2" opacity="0.42"/>
    <path d="M97 226 128 236 159 226" stroke="#e5ce68" stroke-width="2" opacity="0.6"/>
    <path d="M78 131 59 160" stroke="#e7d176" stroke-width="2" opacity="0.65"/>
    <path d="M178 131 197 160" stroke="#e7d176" stroke-width="2" opacity="0.52"/>
  </g>
</svg>
