<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" role="img" aria-label="Atreides four-point compass star icon">
  <defs>
    <linearGradient id="goldBevel" x1="64" y1="40" x2="192" y2="216" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#D8C27A"/>
      <stop offset="0.45" stop-color="#A88B3C"/>
      <stop offset="1" stop-color="#6E5724"/>
    </linearGradient>
    <linearGradient id="greenFacet" x1="72" y1="48" x2="184" y2="208" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5F7A5A"/>
      <stop offset="0.52" stop-color="#254535"/>
      <stop offset="1" stop-color="#10291F"/>
    </linearGradient>
    <linearGradient id="sageFacet" x1="128" y1="56" x2="128" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#9BAE86"/>
      <stop offset="1" stop-color="#3B5F45"/>
    </linearGradient>
    <linearGradient id="shadowFacet" x1="92" y1="92" x2="164" y2="164" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#18372B"/>
      <stop offset="1" stop-color="#071812"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="5" flood-color="#020806" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Transparent background by omission -->

  <!-- Outer noble compass-star silhouette -->
  <path filter="url(#softShadow)" fill="url(#goldBevel)" d="M128 16 L150.5 92.5 L228 128 L150.5 163.5 L128 240 L105.5 163.5 L28 128 L105.5 92.5 Z"/>

  <!-- Deep green inset body -->
  <path fill="url(#greenFacet)" d="M128 34 L145.3 101.4 L210 128 L145.3 154.6 L128 222 L110.7 154.6 L46 128 L110.7 101.4 Z"/>

  <!-- Four refined beveled arms -->
  <path fill="url(#sageFacet)" d="M128 34 L145.3 101.4 L128 117.6 L110.7 101.4 Z" opacity="0.95"/>
  <path fill="#1D3B2E" d="M210 128 L145.3 154.6 L128 138.4 L145.3 101.4 Z" opacity="0.96"/>
  <path fill="#153126" d="M128 222 L110.7 154.6 L128 138.4 L145.3 154.6 Z" opacity="0.98"/>
  <path fill="#46694D" d="M46 128 L110.7 101.4 L128 117.6 L110.7 154.6 Z" opacity="0.96"/>

  <!-- Inner compass diamond -->
  <path fill="url(#goldBevel)" d="M128 88 L168 128 L128 168 L88 128 Z"/>
  <path fill="url(#shadowFacet)" d="M128 99 L157 128 L128 157 L99 128 Z"/>

  <!-- Faceted center, heraldic and military-refined -->
  <path fill="#84A06F" d="M128 99 L157 128 L128 122 Z" opacity="0.9"/>
  <path fill="#284F39" d="M157 128 L128 157 L134 128 Z"/>
  <path fill="#183629" d="M128 157 L99 128 L128 134 Z"/>
  <path fill="#5C7B55" d="M99 128 L128 99 L122 128 Z"/>

  <!-- Muted gold rib lines for beveled geometry -->
  <path fill="none" stroke="#C2A657" stroke-width="3" stroke-linejoin="round" stroke-linecap="round" d="M128 34 L128 99 M210 128 L157 128 M128 222 L128 157 M46 128 L99 128" opacity="0.72"/>
  <path fill="none" stroke="#E2D08A" stroke-width="1.6" stroke-linejoin="round" d="M128 16 L150.5 92.5 L228 128 L150.5 163.5 L128 240 L105.5 163.5 L28 128 L105.5 92.5 Z" opacity="0.55"/>

  <!-- Subtle protective shield-like center mark, abstract/no text -->
  <path fill="#BFA35A" d="M128 113 L139 124 L135 144 L128 151 L121 144 L117 124 Z" opacity="0.88"/>
  <path fill="#264B37" d="M128 119 L134 126 L132 140 L128 145 L124 140 L122 126 Z" opacity="0.9"/>
</svg>
