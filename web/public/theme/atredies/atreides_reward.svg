<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">Atreides Reward Chest Icon</title>
  <desc id="desc">A transparent sci-fi heraldic reward chest in deep green, sage, and muted gold.</desc>
  <defs>
    <linearGradient id="goldBevel" x1="44" y1="51" x2="212" y2="214" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#D8C27A"/>
      <stop offset="0.48" stop-color="#9E8543"/>
      <stop offset="1" stop-color="#E6D08A"/>
    </linearGradient>
    <linearGradient id="greenFace" x1="54" y1="65" x2="198" y2="213" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#31573F"/>
      <stop offset="0.52" stop-color="#1E3D31"/>
      <stop offset="1" stop-color="#122B25"/>
    </linearGradient>
    <linearGradient id="sagePanel" x1="66" y1="90" x2="190" y2="190" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#91A77F"/>
      <stop offset="1" stop-color="#5F755F"/>
    </linearGradient>
    <linearGradient id="shadow" x1="64" y1="204" x2="192" y2="226" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#071411" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#071411" stop-opacity="0.38"/>
      <stop offset="1" stop-color="#071411" stop-opacity="0"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#071411" flood-opacity="0.38"/>
    </filter>
  </defs>

  <ellipse cx="128" cy="216" rx="72" ry="12" fill="url(#shadow)"/>

  <g filter="url(#softShadow)">
    <!-- Heraldic rear crest silhouette -->
    <path d="M128 26 L181 59 L166 96 L128 82 L90 96 L75 59 Z" fill="#152E27" stroke="url(#goldBevel)" stroke-width="5" stroke-linejoin="round"/>
    <path d="M128 39 L165 62 L155 84 L128 74 L101 84 L91 62 Z" fill="#274B38" stroke="#82956F" stroke-width="2" stroke-linejoin="round" opacity="0.95"/>

    <!-- Chest lid body -->
    <path d="M61 91 L82 65 H174 L195 91 V123 H61 Z" fill="url(#greenFace)" stroke="url(#goldBevel)" stroke-width="6" stroke-linejoin="round"/>
    <path d="M82 65 L96 88 H160 L174 65" fill="none" stroke="#D6C078" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>
    <path d="M66 95 H190" stroke="#B99D58" stroke-width="5" stroke-linecap="round"/>

    <!-- Main crate body -->
    <path d="M55 119 H201 L190 204 H66 Z" fill="url(#greenFace)" stroke="url(#goldBevel)" stroke-width="6" stroke-linejoin="round"/>

    <!-- Side beveled panels -->
    <path d="M69 135 H103 L98 187 H75 Z" fill="#18362E" stroke="#738A65" stroke-width="3" stroke-linejoin="round"/>
    <path d="M153 135 H187 L181 187 H158 Z" fill="#18362E" stroke="#738A65" stroke-width="3" stroke-linejoin="round"/>
    <path d="M83 143 H95 L92 179 H79 Z" fill="#284D38" opacity="0.72"/>
    <path d="M164 143 H176 L172 179 H161 Z" fill="#284D38" opacity="0.72"/>

    <!-- Central noble reward lock / shield -->
    <path d="M111 128 H145 L152 144 V173 L128 191 L104 173 V144 Z" fill="url(#sagePanel)" stroke="url(#goldBevel)" stroke-width="5" stroke-linejoin="round"/>
    <path d="M128 137 L139 154 H131 L137 174 L128 166 L119 174 L125 154 H117 Z" fill="#D8C27A" stroke="#6E5A2E" stroke-width="1.5" stroke-linejoin="round"/>
    <circle cx="128" cy="153" r="4.5" fill="#1A332A" opacity="0.9"/>

    <!-- Gold military bracing -->
    <path d="M55 119 H201" stroke="#E1CB82" stroke-width="4" stroke-linecap="round" opacity="0.9"/>
    <path d="M79 119 L71 204" stroke="#A78949" stroke-width="5" stroke-linecap="round"/>
    <path d="M177 119 L185 204" stroke="#A78949" stroke-width="5" stroke-linecap="round"/>
    <path d="M64 204 H192" stroke="#E1CB82" stroke-width="4" stroke-linecap="round" opacity="0.9"/>

    <!-- Refined bevel highlights -->
    <path d="M67 126 H189 L185 134 H71 Z" fill="#D8C27A" opacity="0.16"/>
    <path d="M86 73 H170" stroke="#F0DFA5" stroke-width="2" stroke-linecap="round" opacity="0.55"/>
    <path d="M113 132 H143" stroke="#F0DFA5" stroke-width="2" stroke-linecap="round" opacity="0.55"/>

    <!-- Small rivets -->
    <g fill="#D8C27A" stroke="#6B572E" stroke-width="1">
      <circle cx="73" cy="111" r="3.2"/>
      <circle cx="183" cy="111" r="3.2"/>
      <circle cx="75" cy="196" r="3.2"/>
      <circle cx="181" cy="196" r="3.2"/>
      <circle cx="96" cy="77" r="2.7"/>
      <circle cx="160" cy="77" r="2.7"/>
    </g>

    <!-- Noble house chevrons -->
    <path d="M88 101 L128 88 L168 101" fill="none" stroke="#AFC19A" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
    <path d="M96 112 L128 101 L160 112" fill="none" stroke="#CBB46A" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>
  </g>
</svg>
