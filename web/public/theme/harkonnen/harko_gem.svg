<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" fill="none">
  <defs>
    <linearGradient id="steelA" x1="70" y1="24" x2="186" y2="232" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2b2c2c"/>
      <stop offset="0.45" stop-color="#090909"/>
      <stop offset="1" stop-color="#010101"/>
    </linearGradient>
    <linearGradient id="steelB" x1="128" y1="16" x2="128" y2="236" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4b4d4c"/>
      <stop offset="0.35" stop-color="#151515"/>
      <stop offset="1" stop-color="#000"/>
    </linearGradient>
    <radialGradient id="crimsonGlow" cx="128" cy="132" r="86" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ff2a2a"/>
      <stop offset="0.34" stop-color="#b00013"/>
      <stop offset="0.68" stop-color="#310006"/>
      <stop offset="1" stop-color="#050000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="redFacet" x1="128" y1="42" x2="128" y2="218" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ff4a4a"/>
      <stop offset="0.42" stop-color="#a00012"/>
      <stop offset="1" stop-color="#1a0004"/>
    </linearGradient>
    <filter id="glow" x="32" y="20" width="192" height="216" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="crystalClip">
      <path d="M128 14 172 69 202 138 128 240 54 138 84 69 128 14Z"/>
    </clipPath>
  </defs>

  <!-- transparent background by design -->

