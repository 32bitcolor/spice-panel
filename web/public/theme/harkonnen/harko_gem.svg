  <path d="M210 123 186 78 172 155 194 185Z" fill="#080808" stroke="#303030" stroke-width="1.5"/>
  <path d="M70 78 88 143 84 155Z" fill="#242625"/>
  <path d="M186 78 168 143 172 155Z" fill="#242625"/>
