    <path d="M128 54 146 128 128 221 110 128Z" fill="url(#redFacet)"/>
    <path d="M128 54 128 112 110 128Z" fill="#ff3333" opacity="0.78"/>
    <path d="M128 54 146 128 128 112Z" fill="#550006" opacity="0.95"/>
    <path d="M110 128 128 112 128 160 84 151Z" fill="#7a000a" opacity="0.92"/>
    <path d="M146 128 128 112 128 160 172 151Z" fill="#220004" opacity="0.95"/>
