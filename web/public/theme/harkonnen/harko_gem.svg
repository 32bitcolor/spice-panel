  <!-- hard vector facet strokes -->
  <path d="M128 14 172 69 202 138 128 240 54 138 84 69 128 14Z" stroke="#171717" stroke-width="3" stroke-linejoin="miter"/>
  <path d="M128 14V240" stroke="#686868" stroke-width="1.2" opacity="0.55"/>
