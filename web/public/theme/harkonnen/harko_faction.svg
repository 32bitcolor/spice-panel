<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" role="img" aria-label="Sci-fi rewards badge icon">
  <defs>
    <linearGradient id="crimson" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7b070b"/>
      <stop offset="0.52" stop-color="#c01822"/>
      <stop offset="1" stop-color="#3d0205"/>
    </linearGradient>
    <linearGradient id="blackMetal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#252829"/>
      <stop offset="0.5" stop-color="#08090a"/>
      <stop offset="1" stop-color="#141718"/>
    </linearGradient>
    <linearGradient id="darkFacet" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2a2d2e"/>
      <stop offset="1" stop-color="#020303"/>
    </linearGradient>
    <filter id="hardShadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="2" flood-color="#000000" flood-opacity="0.65"/>
    </filter>
  </defs>

  <!-- transparent background intentionally omitted -->

  <g filter="url(#hardShadow)" stroke-linejoin="miter" stroke-linecap="butt">
    <!-- cardinal spikes -->
    <polygon points="128,5 145,39 128,55 111,39" fill="#050607"/>
    <polygon points="128,13 139,38 128,50 117,38" fill="url(#crimson)"/>
    <polygon points="128,251 111,217 128,201 145,217" fill="#050607"/>
    <polygon points="128,243 117,218 128,206 139,218" fill="url(#crimson)"/>
    <polygon points="5,128 39,111 55,128 39,145" fill="#050607"/>
    <polygon points="13,128 38,117 50,128 38,139" fill="url(#crimson)"/>
    <polygon points="251,128 217,145 201,128 217,111" fill="#050607"/>
    <polygon points="243,128 218,139 206,128 218,117" fill="url(#crimson)"/>

    <!-- outer octagonal badge -->
    <polygon points="79,22 177,22 234,79 234,177 177,234 79,234 22,177 22,79"
             fill="#050607"/>
    <polygon points="83,30 173,30 226,83 226,173 173,226 83,226 30,173 30,83"
             fill="url(#crimson)"/>
    <polygon points="88,42 168,42 214,88 214,168 168,214 88,214 42,168 42,88"
             fill="#050607"/>

    <!-- armored frame panels -->
    <polygon points="83,42 115,42 101,59 62,98 45,90" fill="url(#darkFacet)"/>
    <polygon points="141,42 173,42 211,90 194,98 155,59" fill="url(#darkFacet)"/>
    <polygon points="214,88 214,120 197,108 157,68 167,50" fill="#181b1c"/>
    <polygon points="214,136 214,168 167,206 157,188 197,148" fill="#181b1c"/>
    <polygon points="173,214 141,214 155,197 194,158 211,166" fill="url(#darkFacet)"/>
    <polygon points="115,214 83,214 45,166 62,158 101,197" fill="url(#darkFacet)"/>
    <polygon points="42,168 42,136 59,148 99,188 89,206" fill="#181b1c"/>
    <polygon points="42,120 42,88 89,50 99,68 59,108" fill="#181b1c"/>

    <!-- inner dark field -->
    <circle cx="128" cy="128" r="78" fill="#040505"/>

    <!-- segmented crimson reward ring -->
    <path d="M82 82 A65 65 0 0 1 116 65 L111 87 A43 43 0 0 0 87 111 Z" fill="url(#crimson)"/>
    <path d="M140 65 A65 65 0 0 1 174 82 L169 111 A43 43 0 0 0 145 87 Z" fill="url(#crimson)"/>
    <path d="M174 174 A65 65 0 0 1 140 191 L145 169 A43 43 0 0 0 169 145 Z" fill="url(#crimson)"/>
    <path d="M116 191 A65 65 0 0 1 82 174 L87 145 A43 43 0 0 0 111 169 Z" fill="url(#crimson)"/>

    <!-- black separators / inner octagonal brace -->
    <polygon points="128,51 183,73 205,128 183,183 128,205 73,183 51,128 73,73"
             fill="none" stroke="#111314" stroke-width="8"/>
    <polygon points="128,58 177,79 198,128 177,177 128,198 79,177 58,128 79,79"
             fill="none" stroke="#000000" stroke-width="4"/>

    <!-- central aggressive star: alternating crimson and black-metal facets -->
    <g>
      <polygon points="128,43 139,112 128,128 117,112" fill="url(#crimson)"/>
      <polygon points="213,128 144,139 128,128 144,117" fill="url(#crimson)"/>
      <polygon points="128,213 117,144 128,128 139,144" fill="url(#crimson)"/>
      <polygon points="43,128 112,117 128,128 112,139" fill="url(#crimson)"/>

      <polygon points="188,68 145,117 128,128 139,102" fill="#181b1c"/>
      <polygon points="188,188 139,145 128,128 154,139" fill="#181b1c"/>
      <polygon points="68,188 117,139 128,128 102,154" fill="#181b1c"/>
      <polygon points="68,68 117,117 128,128 102,139" fill="#181b1c"/>

      <polygon points="188,68 154,117 128,128 145,117" fill="#c01822" opacity="0.92"/>
      <polygon points="188,188 145,154 128,128 139,145" fill="#a20d15" opacity="0.92"/>
      <polygon points="68,188 102,139 128,128 117,139" fill="#b8141c" opacity="0.92"/>
      <polygon points="68,68 139,102 128,128 117,117" fill="#8b0a10" opacity="0.92"/>

      <polygon points="128,43 128,128 139,112" fill="#050607" opacity="0.34"/>
      <polygon points="213,128 128,128 144,139" fill="#050607" opacity="0.34"/>
      <polygon points="128,213 128,128 117,144" fill="#050607" opacity="0.34"/>
      <polygon points="43,128 128,128 112,117" fill="#050607" opacity="0.34"/>
    </g>

    <!-- center lock point -->
    <circle cx="128" cy="128" r="3.2" fill="#050607"/>

    <!-- brutalist hard outer stroke -->
    <polygon points="79,22 177,22 234,79 234,177 177,234 79,234 22,177 22,79"
             fill="none" stroke="#000000" stroke-width="4"/>
  </g>
</svg>
