    <path d="M137 68 L172 103 L145 91 L128 76 Z" fill="#080808"/>
    <path d="M71 103 L95 70 L87 95 Z" fill="#070707"/>
    <path d="M185 103 L161 70 L169 95 Z" fill="#070707"/>

    <!-- Middle chevron -->
