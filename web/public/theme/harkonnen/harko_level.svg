    <path d="M128 80 L239 183 L211 197 L128 119 L45 197 L17 183 Z" fill="url(#crimsonSteel)" stroke="url(#edgeRed)" stroke-width="2"/>
    <path d="M128 96 L128 140" stroke="#090909" stroke-width="5"/>
    <path d="M119 135 L84 169 L111 158 L128 143 Z" fill="#080808"/>
    <path d="M137 135 L172 169 L145 158 L128 143 Z" fill="#080808"/>
    <path d="M67 170 L96 132 L88 161 Z" fill="#070707"/>
    <path d="M189 170 L160 132 L168 161 Z" fill="#070707"/>

