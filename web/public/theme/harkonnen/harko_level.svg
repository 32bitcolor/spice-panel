<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" role="img" aria-label="Three stacked sci-fi level chevrons">
  <defs>
    <linearGradient id="crimsonSteel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#d01018"/>
      <stop offset="0.48" stop-color="#8f050a"/>
      <stop offset="1" stop-color="#4f0205"/>
    </linearGradient>
    <linearGradient id="edgeRed" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff1b24"/>
      <stop offset="1" stop-color="#5b0206"/>
    </linearGradient>
    <filter id="hardShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="3" stdDeviation="1.2" flood-color="#000000" flood-opacity="0.55"/>
    </filter>
  </defs>

  <!-- Transparent background intentionally omitted. -->

  <g filter="url(#hardShadow)" stroke-linejoin="miter" stroke-linecap="butt">
    <!-- Top chevron -->
    <path d="M128 20 L225 112 L203 121 L128 55 L53 121 L31 112 Z" fill="#090909"/>
    <path d="M128 14 L232 110 L207 122 L128 50 L49 122 L24 110 Z" fill="url(#crimsonSteel)" stroke="url(#edgeRed)" stroke-width="2"/>
