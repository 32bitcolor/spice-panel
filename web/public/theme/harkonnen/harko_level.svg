    <path d="M137 198 L172 224 L145 214 L128 206 Z" fill="#080808"/>
    <path d="M64 225 L96 196 L88 217 Z" fill="#070707"/>
    <path d="M192 225 L160 196 L168 217 Z" fill="#070707"/>
