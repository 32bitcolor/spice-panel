<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" role="img" aria-label="Jagged crimson spice crystal reward icon">
  <defs>
    <linearGradient id="redMain" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ff2632"/>
      <stop offset="0.52" stop-color="#9b0711"/>
      <stop offset="1" stop-color="#2a0306"/>
    </linearGradient>
    <linearGradient id="redDark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6d040a"/>
      <stop offset="1" stop-color="#090102"/>
    </linearGradient>
    <linearGradient id="redEdge" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#e21a24"/>
      <stop offset="1" stop-color="#420408"/>
    </linearGradient>
    <linearGradient id="metal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#343638"/>
      <stop offset="0.45" stop-color="#161719"/>
      <stop offset="1" stop-color="#030405"/>
    </linearGradient>
    <linearGradient id="metalFace" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4b4e50"/>
      <stop offset="1" stop-color="#111214"/>
    </linearGradient>
    <filter id="hardShadow" x="-18%" y="-18%" width="136%" height="136%">
      <feDropShadow dx="0" dy="4" stdDeviation="2" flood-color="#000000" flood-opacity="0.55"/>
    </filter>
  </defs>

  <!-- transparent background intentionally omitted -->

