<!--?xml version="1.0" encoding="UTF-8"?-->
<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Harko sci-fi rewards citadel icon">
  <defs>
    <linearGradient id="blackMetal" x1="67" y1="22" x2="185" y2="237" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#28292c"></stop>
      <stop offset="0.42" stop-color="#09090b"></stop>
      <stop offset="1" stop-color="#17181b"></stop>
    </linearGradient>

    <linearGradient id="blackMetal2" x1="120" y1="28" x2="154" y2="235" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#191a1d"></stop>
      <stop offset="0.45" stop-color="#050506"></stop>
      <stop offset="1" stop-color="#101114"></stop>
    </linearGradient>

    <linearGradient id="edgeMetal" x1="72" y1="138" x2="174" y2="232" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#414247"></stop>
      <stop offset="0.45" stop-color="#202125"></stop>
      <stop offset="1" stop-color="#09090a"></stop>
    </linearGradient>

    <linearGradient id="redCore" x1="128" y1="54" x2="128" y2="227" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ff1d26"></stop>
      <stop offset="0.52" stop-color="#b80011"></stop>
      <stop offset="1" stop-color="#550006"></stop>
    </linearGradient>

    <filter id="redGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.15" result="blur"></feGaussianBlur>
      <feMerge>
        <feMergeNode in="blur"></feMergeNode>
        <feMergeNode in="SourceGraphic"></feMergeNode>
      </feMerge>
    </filter>
  </defs>

  <!-- Transparent background intentionally omitted -->

  <!-- rear monolithic silhouette -->
  <path d="M128 9L145 35L151 72L171 102L188 157L225 237H31L68 157L85 102L105 72L111 35L128 9Z" fill="#030304"></path>

