    <!-- Side armored pillars -->
    <path d="M47 72 L68 51 L83 58 L78 206 L63 213 L44 190 L55 174 L55 90 Z"
          fill="#070707" stroke="#282828" stroke-width="2"/>
    <path d="M209 72 L188 51 L173 58 L178 206 L193 213 L212 190 L201 174 L201 90 Z"
          fill="#070707" stroke="#282828" stroke-width="2"/>

    <!-- Crimson slits in pillars -->
    <path d="M60 75 L66 69 L65 170 L59 181 Z" fill="#9b1117"/>
    <path d="M74 65 L79 68 L77 118 L71 110 Z" fill="#c01820"/>
    <path d="M196 75 L190 69 L191 170 L197 181 Z" fill="#9b1117"/>
    <path d="M182 65 L177 68 L179 118 L185 110 Z" fill="#c01820"/>

    <!-- Main contract parchment panel -->
    <path d="M79 63 L177 63 L190 76 L190 184 L176 197 L80 197 L66 184 L66 76 Z"
