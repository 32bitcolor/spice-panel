    <path d="M128 198 L137 221 L128 236 L119 221 Z" fill="#c51a22"/>
    <path d="M128 198 L128 236 L119 221 Z" fill="#72070b"/>

    <!-- Abstract mission contract marks, no readable text -->
    <g fill="#050505">
      <path d="M88 97 L146 97 L158 109 L174 109 L174 114 L155 114 L142 102 L88 102 Z"/>
      <path d="M84 119 L124 119 L132 126 L163 126 L163 132 L80 132 L88 124 L124 124 L118 122 L84 122 Z"/>
      <path d="M89 143 L143 143 L153 150 L174 150 L170 156 L83 156 Z"/>
      <path d="M83 169 L130 169 L142 160 L169 160 L169 165 L145 165 L133 174 L83 174 Z"/>
      <path d="M99 83 L139 83 L147 89 L172 89 L169 94 L98 94 Z" opacity="0.85"/>
      <path d="M100 181 L139 181 L134 186 L100 186 Z" opacity="0.85"/>
      <path d="M153 132 L181 132 L172 139 L146 139 Z"/>
      <path d="M153 177 L181 177 L173 184 L148 184 Z"/>
    </g>

    <!-- Crack-like angular cuts -->
    <g fill="none" stroke="#250204" stroke-width="2" opacity="0.8">
      <path d="M170 84 L164 96 L172 104"/>
      <path d="M86 151 L97 147 L91 158"/>
      <path d="M174 154 L162 166 L157 178"/>
      <path d="M101 67 L111 81 L107 91"/>
    </g>

    <!-- Metal highlights -->
    <g fill="none" stroke="#333" stroke-width="2" opacity="0.75">
      <path d="M50 72 L69 53"/>
      <path d="M206 72 L187 53"/>
      <path d="M69 211 L52 189"/>
      <path d="M187 211 L204 189"/>
      <path d="M117 50 L128 21 L139 50"/>
    </g>

    <!-- Red accent cuts on lower armor -->
    <path d="M82 221 L104 221 L99 226 L85 226 Z" fill="#b3171d"/>
    <path d="M174 221 L152 221 L157 226 L171 226 Z" fill="#b3171d"/>
  </g>
</svg>
