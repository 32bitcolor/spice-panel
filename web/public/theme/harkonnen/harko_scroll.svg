    <path d="M93 51 L113 51 L119 57 L102 58 L98 55 L88 55 Z" fill="#c0171e"/>
    <path d="M163 51 L143 51 L137 57 L154 58 L158 55 L168 55 Z" fill="#c0171e"/>

    <!-- Bottom scroll roll -->
    <path d="M61 187 L178 187 Q195 187 204 199 L196 217 L59 217 Q47 217 43 206 Q44 193 61 187 Z"
