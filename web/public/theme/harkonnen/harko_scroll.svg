    <!-- Inset angular border -->
    <path d="M76 78 L84 70 L172 70 L180 78 L180 174 L170 187 L86 187 L76 174 Z"
          fill="none" stroke="#160102" stroke-width="3"/>
    <path d="M83 72 L100 72 L93 78 L83 78 Z" fill="#d21b22"/>
    <path d="M173 72 L156 72 L163 78 L173 78 Z" fill="#d21b22"/>
    <path d="M82 186 L101 186 L94 193 L86 193 Z" fill="#d21b22"/>
    <path d="M174 186 L155 186 L162 193 L170 193 Z" fill="#d21b22"/>

    <!-- Top armored crest -->
    <path d="M128 12 L145 49 L164 62 L150 79 L128 90 L106 79 L92 62 L111 49 Z"
          fill="url(#blackMetal)" stroke="#000" stroke-width="4"/>
    <path d="M128 24 L137 54 L128 78 L119 54 Z" fill="#c51a22"/>
    <path d="M128 24 L128 78 L119 54 Z" fill="#77090d"/>
    <path d="M128 12 L145 49 L128 24 L111 49 Z" fill="#232323" opacity="0.85"/>

    <!-- Top shoulder plates -->
    <path d="M81 43 L110 43 L123 55 L111 70 L84 68 L70 55 Z"
