    <path d="M190 196 Q207 196 209 206 Q207 216 190 216 Q199 211 199 206 Q199 201 190 196 Z"
          fill="#a71117" stroke="#070707" stroke-width="3"/>
    <path d="M198 201 Q206 203 204 210 Q202 215 194 214 Q199 210 199 206 Z"
