<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" role="img" aria-label="Sci-fi mission contract scroll icon">
  <defs>
    <linearGradient id="redPanel" x1="0" y1="32" x2="0" y2="224" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#9f1016"/>
      <stop offset="0.52" stop-color="#6f080d"/>
      <stop offset="1" stop-color="#b0171d"/>
    </linearGradient>
    <linearGradient id="blackMetal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#191919"/>
      <stop offset="0.55" stop-color="#050505"/>
      <stop offset="1" stop-color="#2a2a2a"/>
    </linearGradient>
    <linearGradient id="darkEdge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2a2a2a"/>
      <stop offset="1" stop-color="#000000"/>
    </linearGradient>
    <linearGradient id="curlRed" x1="45" y1="193" x2="219" y2="222" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#d51e26"/>
      <stop offset="0.48" stop-color="#7b090f"/>
      <stop offset="1" stop-color="#240204"/>
    </linearGradient>
    <filter id="hardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="2" flood-color="#000000" flood-opacity="0.55"/>
    </filter>
  </defs>

  <!-- Transparent SVG: no background rectangle -->

  <g filter="url(#hardShadow)" stroke-linejoin="miter" stroke-linecap="butt">
    <!-- Outer brutalist silhouette -->
    <path d="M61 39 L86 39 L94 52 L162 52 L170 39 L195 39 L218 71 L204 89 L204 174 L222 191 L206 219 L151 219 L128 243 L105 219 L50 219 L34 191 L52 174 L52 89 L38 71 Z"
