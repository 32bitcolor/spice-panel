      <stop offset="0" stop-color="#FFE08A"/>
      <stop offset="0.48" stop-color="#D98A28"/>
      <stop offset="1" stop-color="#8F3F13"/>
    </linearGradient>
    <linearGradient id="edgeMetal" x1="48" y1="32" x2="208" y2="224" gradientUnits="userSpaceOnUse">
