      <stop offset="0" stop-color="#FFF0B8"/>
      <stop offset="0.55" stop-color="#EFC46B"/>
      <stop offset="1" stop-color="#C77A21"/>
    </linearGradient>
    <linearGradient id="sandPageRight" x1="256" y1="36" x2="256" y2="198" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFF3BF"/>
      <stop offset="0.55" stop-color="#E9B95A"/>
      <stop offset="1" stop-color="#B96717"/>
