    <path d="M128 33c-36.5 0-64 27.4-64 65.6 0 38.7 37.1 89.7 64 121.2 26.9-31.5 64-82.5 64-121.2C192 60.4 164.5 33 128 33Z" fill="#53200B" opacity="0.9"/>
    <path d="M128 36c-34.5 0-60 25.6-60 61.2 0 4 .4 8.1 1.1 12.3h24.4c-.6-3.6-.9-7.2-.9-10.9 0-21.7 15.2-38.7 35.4-38.7s35.4 17 35.4 38.7c0 3.7-.3 7.3-.9 10.9h24.4c.7-4.2 1.1-8.3 1.1-12.3C188 61.6 162.5 36 128 36Z" fill="#D89535"/>
    <path d="M73 119c7.4 28.8 30.9 63.7 55 93.6 24.1-29.9 47.6-64.8 55-93.6h-23.5c-8.1 20.8-22.2 42.9-31.5 55.9-9.3-13-23.4-35.1-31.5-55.9H73Z" fill="#8D3A12"/>
