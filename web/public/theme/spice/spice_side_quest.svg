    <path d="M128 171v26" stroke="#FFB83F" stroke-width="4" stroke-linecap="round"/>
    <circle cx="128" cy="208" r="4" fill="#FFB83F"/>
    <path d="M115 159 128 171 141 159" stroke="#FFD166" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

