    <circle cx="128" cy="98" r="55" fill="url(#innerAmber)" stroke="#3C1507" stroke-width="4"/>
    <circle cx="128" cy="98" r="49" fill="url(#amberGlow)"/>
    <circle cx="128" cy="98" r="40" stroke="#F3B543" stroke-width="3" stroke-dasharray="54 16" stroke-linecap="round"/>
    <circle cx="128" cy="98" r="28" stroke="#E28B25" stroke-width="1.5" stroke-opacity="0.6" stroke-dasharray="8 7"/>

