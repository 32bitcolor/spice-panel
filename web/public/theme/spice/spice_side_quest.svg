    <path d="M73 58l8 4M181 58l-8 4M73 75h8M175 75h8M93 37l-7 10M163 37l7 10" stroke="#72300D" stroke-width="2" stroke-linecap="round" opacity="0.45"/>
    <path d="M58 121h14M184 121h14M70 133h12M174 133h12" stroke="#F0B24C" stroke-width="2" stroke-linecap="round" opacity="0.55"/>
