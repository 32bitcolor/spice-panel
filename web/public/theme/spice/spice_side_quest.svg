    <path d="M128 79 147 98 128 117 109 98 128 79Z" fill="none" stroke="#FFE38A" stroke-width="5" stroke-linejoin="round"/>

    <!-- Turquoise side quest accent -->
    <g filter="url(#glow)">
      <path d="M128 85 141 98 128 111 115 98 128 85Z" fill="url(#turquoise)" stroke="#063F43" stroke-width="2.5" stroke-linejoin="round"/>
