    <radialGradient id="amberGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(128 104) rotate(90) scale(73 64)">
      <stop offset="0" stop-color="#FFA92C" stop-opacity="0.55"/>
      <stop offset="0.65" stop-color="#B84B0A" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#2E0F06" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="30" y="10" width="196" height="235" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="3" stdDeviation="2.2" flood-color="#1B0802" flood-opacity="0.55"/>
    </filter>
    <filter id="glow" x="102" y="96" width="52" height="52" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

