<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" fill="none">
  <defs>
    <linearGradient id="outerGold" x1="58" y1="22" x2="198" y2="235" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F8C868"/>
      <stop offset="0.42" stop-color="#C97822"/>
      <stop offset="1" stop-color="#6B2E12"/>
    </linearGradient>
    <linearGradient id="innerAmber" x1="91" y1="48" x2="165" y2="198" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#A94A0A"/>
      <stop offset="0.45" stop-color="#D66B10"/>
      <stop offset="1" stop-color="#4A1B0B"/>
    </linearGradient>
    <linearGradient id="sandMetal" x1="84" y1="65" x2="170" y2="166" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFF0A5"/>
      <stop offset="0.46" stop-color="#D9942D"/>
      <stop offset="1" stop-color="#7B3A12"/>
    </linearGradient>
    <linearGradient id="turquoise" x1="118" y1="112" x2="139" y2="138" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#76FFF2"/>
      <stop offset="0.55" stop-color="#23D0C7"/>
