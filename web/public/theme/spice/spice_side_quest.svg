    <path d="M128 51 139 88 176 98 139 108 128 154 117 108 80 98 117 88 128 51Z" fill="url(#sandMetal)" stroke="#5A2108" stroke-width="3" stroke-linejoin="round"/>
    <path d="M128 72 135 93 156 98 135 103 128 130 121 103 100 98 121 93 128 72Z" fill="#FFEAA2" fill-opacity="0.68"/>
