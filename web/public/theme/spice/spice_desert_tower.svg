    <path d="M99 65h58l-5-12h-48Z" fill="#F4B63D" stroke="#4B291C" stroke-width="4"/>
    <path d="M111 48h34v11h-34Z" fill="#6C3B1F" stroke="#4B291C" stroke-width="4"/>
    <path d="M123 48 128 18l5 30Z" fill="#C26D17" stroke="#4B291C" stroke-width="3"/>

    <!-- front ornament panel -->
    <path d="M128 72 147 94v43l-19 20-19-20V94Z" fill="#5B311E" stroke="#F2B744" stroke-width="5"/>
    <path d="M128 82 138 96v28l-10 13-10-13V96Z" fill="url(#turq)" stroke="#075D5B" stroke-width="3"/>
