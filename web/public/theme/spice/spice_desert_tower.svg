    <!-- rear tanks -->
    <path d="M49 184h42v31H43v-25c0-3 3-6 6-6Z" fill="#8B4A20" stroke="#4B291C" stroke-width="4"/>
    <path d="M48 148h39c6 0 11 5 11 11v30H37v-30c0-6 5-11 11-11Z" fill="#B96018" stroke="#4B291C" stroke-width="4"/>
    <path d="M42 149c5-16 46-16 51 0Z" fill="#F0B84F" stroke="#4B291C" stroke-width="4"/>
    <path d="M40 166h55" stroke="#F6C861" stroke-width="5"/>
    <path d="M166 184h42c3 0 6 3 6 6v25h-54v-25c0-3 3-6 6-6Z" fill="#76401F" stroke="#4B291C" stroke-width="4"/>
    <path d="M166 153h42c6 0 11 5 11 11v26h-64v-26c0-6 5-11 11-11Z" fill="#9B5523" stroke="#4B291C" stroke-width="4"/>
    <path d="M161 154c6-17 49-17 55 0Z" fill="#DFA947" stroke="#4B291C" stroke-width="4"/>
    <path d="M160 170h57" stroke="#F6C861" stroke-width="5"/>

