    <path d="M82 163v-37c0-12 10-22 22-22h18" fill="none" stroke="#5D351E" stroke-width="14"/>
    <path d="M82 163v-37c0-12 10-22 22-22h18" fill="none" stroke="#B16A27" stroke-width="6"/>
    <path d="M174 162v-36c0-12-10-22-22-22h-19" fill="none" stroke="#5D351E" stroke-width="14"/>
    <path d="M174 162v-36c0-12-10-22-22-22h-19" fill="none" stroke="#B16A27" stroke-width="6"/>
    <path d="M80 134h15M160 134h15" stroke="#F6C861" stroke-width="5"/>

