    <path d="M106 119 94 129v37M150 119l12 10v37" fill="none" stroke="#4B291C" stroke-width="4" opacity="0.75"/>
    <circle cx="111" cy="125" r="3" fill="#3B2318"/>
    <circle cx="145" cy="125" r="3" fill="#3B2318"/>

    <!-- turquoise lower lights -->
    <path d="M91 198v12M165 198v12" stroke="#22D5C8" stroke-width="4"/>
