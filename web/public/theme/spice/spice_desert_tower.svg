<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">Desert Tower Spice Refinery Icon</title>
  <desc id="desc">A transparent sci-fi desert tower and spice refinery icon in amber, burnt umber, golden sand, and turquoise.</desc>
  <defs>
    <linearGradient id="tower" x1="88" y1="42" x2="168" y2="216" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F6B33A"/>
      <stop offset="0.48" stop-color="#C96B18"/>
      <stop offset="1" stop-color="#6D381E"/>
    </linearGradient>
    <linearGradient id="sand" x1="44" y1="165" x2="102" y2="226" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFD079"/>
      <stop offset="1" stop-color="#D67414"/>
    </linearGradient>
    <linearGradient id="metal" x1="60" y1="40" x2="196" y2="220" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFE08D"/>
      <stop offset="0.42" stop-color="#D99A2D"/>
      <stop offset="1" stop-color="#7A431F"/>
    </linearGradient>
    <linearGradient id="turq" x1="128" y1="74" x2="128" y2="126" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7DF9EF"/>
      <stop offset="1" stop-color="#00A9A5"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="3" flood-color="#3A2116" flood-opacity="0.28"/>
    </filter>
  </defs>

