<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" role="img" aria-label="Spice reward chest icon">
  <defs>
    <linearGradient id="sand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8d98a"/>
      <stop offset="0.52" stop-color="#d99a38"/>
      <stop offset="1" stop-color="#8d471b"/>
    </linearGradient>
    <linearGradient id="lid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffe0a0"/>
      <stop offset="1" stop-color="#c97922"/>
    </linearGradient>
    <linearGradient id="umber" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#c66016"/>
      <stop offset="1" stop-color="#6d3214"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff1a8"/>
      <stop offset="0.45" stop-color="#d79a24"/>
      <stop offset="1" stop-color="#7a3b13"/>
    </linearGradient>
    <linearGradient id="turq" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#96fff1"/>
      <stop offset="0.55" stop-color="#15d3c5"/>
      <stop offset="1" stop-color="#06767a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="145%">
      <feDropShadow dx="0" dy="8" stdDeviation="4" flood-color="#2b1608" flood-opacity="0.35"/>
    </filter>
    <clipPath id="crateClip">
      <path d="M34 76 L54 50 H202 L222 76 V190 L205 207 H51 L34 190 Z"/>
    </clipPath>
  </defs>

  <!-- transparent background intentionally omitted -->

  <g filter="url(#shadow)">
    <!-- outer crate silhouette -->
    <path d="M34 76 L54 50 H202 L222 76 V190 L205 207 H51 L34 190 Z" fill="url(#sand)" stroke="#4a220f" stroke-width="5" stroke-linejoin="round"/>

    <!-- lid -->
    <path d="M40 78 L58 56 H198 L216 78 V116 H40 Z" fill="url(#lid)" stroke="#5b2a10" stroke-width="4" stroke-linejoin="round"/>
    <path d="M58 56 H198 L210 76 H46 Z" fill="#f7c96d" opacity="0.65"/>
    <path d="M47 85 H209" stroke="#4a220f" stroke-width="5" stroke-linecap="round" opacity="0.7"/>

    <!-- body panels -->
    <path d="M42 118 H214 V186 L201 199 H55 L42 186 Z" fill="url(#umber)" stroke="#4a220f" stroke-width="4" stroke-linejoin="round"/>
    <path d="M58 132 H103 L91 184 H58 Z" fill="#b85318" stroke="#f3b641" stroke-width="2" opacity="0.95"/>
    <path d="M153 132 H198 V184 H165 Z" fill="#b85318" stroke="#f3b641" stroke-width="2" opacity="0.95"/>
    <path d="M103 132 H153 L144 196 H112 Z" fill="#8d4218" opacity="0.55"/>

    <!-- reinforced corners -->
    <path d="M35 78 L55 51 H80 L68 91 H42 Z" fill="#c66b18" stroke="#4a220f" stroke-width="3" stroke-linejoin="round"/>
    <path d="M221 78 L201 51 H176 L188 91 H214 Z" fill="#c66b18" stroke="#4a220f" stroke-width="3" stroke-linejoin="round"/>
    <path d="M35 171 L54 154 V204 H51 L35 188 Z" fill="#7a3b13" stroke="#4a220f" stroke-width="3" stroke-linejoin="round"/>
    <path d="M221 171 L202 154 V204 H205 L221 188 Z" fill="#7a3b13" stroke="#4a220f" stroke-width="3" stroke-linejoin="round"/>

    <!-- sci-fi trims -->
    <path d="M48 112 H101 L111 124 H145 L155 112 H208" fill="none" stroke="url(#gold)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M53 194 H203" stroke="#3b1d0d" stroke-width="8" stroke-linecap="round"/>
    <path d="M70 102 H102" stroke="#15d3c5" stroke-width="5" stroke-linecap="round"/>
    <path d="M154 102 H186" stroke="#15d3c5" stroke-width="5" stroke-linecap="round"/>

    <!-- top medallion -->
    <circle cx="128" cy="77" r="34" fill="url(#gold)" stroke="#4a220f" stroke-width="4"/>
    <circle cx="128" cy="77" r="25" fill="#b95a17" stroke="#ffd874" stroke-width="2"/>
    <path d="M128 49 L139 78 L128 101 L117 78 Z" fill="#ffd466" stroke="#6c310f" stroke-width="2"/>
    <path d="M105 84 C115 77 122 78 128 86 C135 78 145 77 153 84" fill="none" stroke="#f0a523" stroke-width="7" stroke-linecap="round"/>
    <path d="M116 79 L128 55 L140 79 Z" fill="#ffec9b" opacity="0.55"/>

    <!-- central lock -->
    <path d="M107 103 H149 L160 126 V178 L128 205 L96 178 V126 Z" fill="url(#gold)" stroke="#4a220f" stroke-width="5" stroke-linejoin="round"/>
    <path d="M116 113 H140 L149 131 V169 L128 188 L107 169 V131 Z" fill="#8a4417" stroke="#ffcb55" stroke-width="2" stroke-linejoin="round"/>
    <path d="M128 125 L146 150 L128 177 L110 150 Z" fill="url(#turq)" stroke="#043c43" stroke-width="4" stroke-linejoin="round"/>
    <path d="M128 131 L139 150 L128 169 L117 150 Z" fill="#a4fff1" opacity="0.45"/>
    <path d="M128 125 V177 M110 150 H146" stroke="#dffff8" stroke-width="1.5" opacity="0.75"/>

    <!-- latch cap -->
    <rect x="111" y="94" width="34" height="23" rx="4" fill="#c57920" stroke="#4a220f" stroke-width="4"/>
    <rect x="118" y="99" width="20" height="8" rx="2" fill="#ffe28a" opacity="0.7"/>

    <!-- panel details -->
    <g stroke="#3d1b0b" stroke-width="4" stroke-linecap="round" opacity="0.88">
      <path d="M73 166 L86 154"/>
      <path d="M79 171 L92 159"/>
      <path d="M164 154 L177 166"/>
      <path d="M158 159 L171 171"/>
      <path d="M73 77 L84 65"/>
      <path d="M183 65 L194 77"/>
    </g>

    <!-- sand wear speckles -->
    <g fill="#6d3214" opacity="0.28">
      <circle cx="67" cy="72" r="2"/><circle cx="91" cy="61" r="1.5"/><circle cx="176" cy="89" r="1.5"/>
      <circle cx="64" cy="145" r="2"/><circle cx="190" cy="147" r="2"/><circle cx="85" cy="188" r="1.5"/>
      <circle cx="170" cy="183" r="1.5"/><circle cx="136" cy="66" r="1.3"/><circle cx="110" cy="151" r="1.4"/>
    </g>

    <!-- highlights -->
    <path d="M55 67 H191" stroke="#fff0b8" stroke-width="3" stroke-linecap="round" opacity="0.45"/>
    <path d="M45 124 H92" stroke="#ffd77b" stroke-width="2" stroke-linecap="round" opacity="0.55"/>
    <path d="M166 124 H211" stroke="#ffd77b" stroke-width="2" stroke-linecap="round" opacity="0.55"/>
  </g>
</svg>
