<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" role="img" aria-label="Hexagonal sci-fi intel token icon">
  <defs>
    <linearGradient id="gold" x1="64" y1="34" x2="194" y2="224" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFE08A"/>
      <stop offset="0.35" stop-color="#D88A19"/>
      <stop offset="0.7" stop-color="#8C4B10"/>
      <stop offset="1" stop-color="#F6C65B"/>
    </linearGradient>
    <linearGradient id="sand" x1="86" y1="44" x2="174" y2="210" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFD56E"/>
      <stop offset="1" stop-color="#B86513"/>
    </linearGradient>
    <radialGradient id="core" cx="50%" cy="48%" r="56%">
      <stop offset="0" stop-color="#54FFF0"/>
      <stop offset="0.55" stop-color="#22BDBA"/>
      <stop offset="1" stop-color="#087E80"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="3" flood-color="#2A1305" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Transparent background intentionally omitted -->

  <g filter="url(#softShadow)" stroke-linecap="round" stroke-linejoin="round">
    <!-- Outer hex token -->
    <path d="M128 12 L226 69 L226 187 L128 244 L30 187 L30 69 Z"
