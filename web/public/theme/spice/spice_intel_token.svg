    <path d="M128 28 L211 76 L211 180 L128 228 L45 180 L45 76 Z"
          fill="#5A2D0E" stroke="#F8C85E" stroke-width="5"/>
    <path d="M128 40 L200 82 L200 174 L128 216 L56 174 L56 82 Z"
          fill="#6F3B10" stroke="#271204" stroke-width="3" opacity="0.95"/>

    <!-- Metallic side ornaments -->
    <g fill="#F2B638" stroke="#6A3409" stroke-width="3">
      <path d="M128 12 L154 27 L148 42 L128 31 L108 42 L102 27 Z"/>
      <path d="M128 244 L102 229 L108 214 L128 225 L148 214 L154 229 Z"/>
      <path d="M30 69 L55 55 L68 64 L45 78 L45 100 L30 91 Z"/>
      <path d="M226 69 L201 55 L188 64 L211 78 L211 100 L226 91 Z"/>
      <path d="M30 187 L55 201 L68 192 L45 178 L45 156 L30 165 Z"/>
      <path d="M226 187 L201 201 L188 192 L211 178 L211 156 L226 165 Z"/>
    </g>

    <!-- Turquoise inlays -->
    <g fill="url(#core)" stroke="#2A1606" stroke-width="3">
      <path d="M123 33 L128 23 L133 33 L133 55 L128 65 L123 55 Z"/>
      <path d="M123 201 L128 191 L133 201 L133 223 L128 233 L123 223 Z"/>
      <path d="M34 123 L44 116 L66 116 L77 128 L66 140 L44 140 Z"/>
      <path d="M222 123 L212 116 L190 116 L179 128 L190 140 L212 140 Z"/>
    </g>

    <!-- Inner circular tech field -->
    <circle cx="128" cy="128" r="82" fill="#3F210B" stroke="#1C0D03" stroke-width="4"/>
    <circle cx="128" cy="128" r="72" fill="none" stroke="#F5C653" stroke-width="5"/>
    <circle cx="128" cy="128" r="56" fill="none" stroke="#D87810" stroke-width="10" stroke-dasharray="58 16 40 18" transform="rotate(-18 128 128)"/>
    <circle cx="128" cy="128" r="45" fill="none" stroke="#FFE071" stroke-width="7" stroke-dasharray="36 14 46 12" transform="rotate(25 128 128)"/>
    <circle cx="128" cy="128" r="29" fill="none" stroke="#F4BD45" stroke-width="5"/>
    <circle cx="128" cy="128" r="18" fill="#7B4312" stroke="#F6CC60" stroke-width="4"/>

    <!-- Circuit traces -->
    <g stroke="#F8CF61" stroke-width="5" fill="none">
      <path d="M128 64 L128 95"/>
      <path d="M128 161 L128 192"/>
      <path d="M64 128 L95 128"/>
      <path d="M161 128 L192 128"/>
      <path d="M83 83 L99 99"/>
      <path d="M173 83 L157 99"/>
      <path d="M83 173 L99 157"/>
      <path d="M173 173 L157 157"/>
    </g>

    <!-- Node points -->
    <g fill="#FFE071" stroke="#75400D" stroke-width="3">
      <circle cx="128" cy="64" r="7"/>
      <circle cx="128" cy="192" r="7"/>
      <circle cx="64" cy="128" r="7"/>
      <circle cx="192" cy="128" r="7"/>
      <circle cx="83" cy="83" r="7"/>
      <circle cx="173" cy="83" r="7"/>
      <circle cx="83" cy="173" r="7"/>
      <circle cx="173" cy="173" r="7"/>
    </g>

    <!-- Central intel node -->
    <circle cx="128" cy="128" r="17" fill="url(#core)" stroke="#123A36" stroke-width="4"/>
    <circle cx="128" cy="128" r="10" fill="#63E7D8" opacity="0.6"/>

    <!-- Fine engraved details -->
    <g stroke="#1E0E03" stroke-width="3" opacity="0.8" fill="none">
      <path d="M68 72 L92 58"/>
      <path d="M188 58 L212 72"/>
      <path d="M68 184 L92 198"/>
      <path d="M188 198 L212 184"/>
      <path d="M70 102 L70 84"/>
      <path d="M186 102 L186 84"/>
      <path d="M70 154 L70 172"/>
      <path d="M186 154 L186 172"/>
    </g>
  </g>
</svg>
