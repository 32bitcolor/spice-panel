<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" role="img" aria-label="Spice desert faction crest icon">
  <defs>
    <linearGradient id="sand" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F8D57A"/>
      <stop offset="0.55" stop-color="#D8952E"/>
      <stop offset="1" stop-color="#8D4517"/>
    </linearGradient>
    <linearGradient id="ember" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F49A22"/>
      <stop offset="0.55" stop-color="#B95712"/>
      <stop offset="1" stop-color="#54270F"/>
