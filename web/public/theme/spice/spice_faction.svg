      <stop offset="1" stop-color="#743611" stop-opacity="0.85"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="2" flood-color="#2d1208" flood-opacity="0.35"/>
    </filter>
