<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" role="img" aria-label="Fremen premium badge icon">
  <defs>
    <linearGradient id="navy" x1="38" y1="24" x2="218" y2="232" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#07152d"/>
      <stop offset="0.52" stop-color="#020914"/>
      <stop offset="1" stop-color="#0a1e3d"/>
    </linearGradient>
    <linearGradient id="edge" x1="42" y1="36" x2="214" y2="220" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#123b72"/>
      <stop offset="0.5" stop-color="#071325"/>
      <stop offset="1" stop-color="#0e3568"/>
    </linearGradient>
    <linearGradient id="cyan" x1="80" y1="70" x2="176" y2="186" gradientUnits="userSpaceOnUse">
