<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">Fremen Desert Tower Icon</title>
  <desc id="desc">Transparent sci-fi desert tower and hidden sietch fortress icon in deep navy and cyan.</desc>
  <defs>
    <linearGradient id="towerGrad" x1="0" y1="18" x2="0" y2="224" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#082A63"/>
      <stop offset="0.48" stop-color="#03183C"/>
      <stop offset="1" stop-color="#010817"/>
    </linearGradient>
    <linearGradient id="cyanGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#64F5FF"/>
      <stop offset="1" stop-color="#008BFF"/>
    </linearGradient>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Sacred crescent frame -->
  <path d="M45 180C25 111 57 47 107 33C65 61 44 108 54 167C58 190 72 211 94 230C73 221 55 205 45 180Z" fill="#020A1D"/>
