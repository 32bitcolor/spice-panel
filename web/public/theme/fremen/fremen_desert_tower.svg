  <path d="M56 174C43 113 67 62 105 42" fill="none" stroke="#11BFFF" stroke-width="3" stroke-linecap="round" opacity=".85"/>
  <path d="M200 174C213 113 189 62 151 42" fill="none" stroke="#11BFFF" stroke-width="3" stroke-linecap="round" opacity=".85"/>

  <!-- Twin moons -->
  <path d="M80 94C64 103 60 124 75 138C66 136 58 128 56 117C54 104 63 93 80 94Z" fill="#0DA8FF" opacity=".9"/>
  <path d="M176 94C192 103 196 124 181 138C190 136 198 128 200 117C202 104 193 93 176 94Z" fill="#0DA8FF" opacity=".9"/>

  <!-- Star over tower -->
  <path d="M128 12L132 28L146 33L132 38L128 55L124 38L110 33L124 28Z" fill="url(#cyanGrad)" filter="url(#softGlow)"/>

  <!-- Desert dunes / hidden sietch base -->
  <path d="M25 195C54 187 73 190 97 202C119 213 137 212 160 201C181 191 205 188 231 195L211 215C183 208 161 217 134 230C111 219 91 210 64 216Z" fill="#031231"/>
