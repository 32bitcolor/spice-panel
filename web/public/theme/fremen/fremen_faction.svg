<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" role="img" aria-label="Fremen inspired tribal faction crest">
  <defs>
    <linearGradient id="navy" x1="64" y1="20" x2="192" y2="236" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#071629"/>
      <stop offset="0.55" stop-color="#020815"/>
      <stop offset="1" stop-color="#0a2a50"/>
    </linearGradient>
    <linearGradient id="blue" x1="80" y1="30" x2="180" y2="222" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5ffcff"/>
      <stop offset="0.5" stop-color="#22c8ff"/>
      <stop offset="1" stop-color="#126dff"/>
    </linearGradient>
    <linearGradient id="darkBlue" x1="42" y1="80" x2="214" y2="212" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#061325"/>
      <stop offset="1" stop-color="#0b3567"/>
    </linearGradient>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.35" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

