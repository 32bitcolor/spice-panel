<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" fill="none">
  <defs>
    <linearGradient id="navy" x1="128" y1="36" x2="128" y2="224" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0B2A58"/>
      <stop offset="0.52" stop-color="#06142E"/>
      <stop offset="1" stop-color="#020812"/>
    </linearGradient>
    <linearGradient id="panel" x1="128" y1="54" x2="128" y2="208" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#10376C"/>
      <stop offset="1" stop-color="#031225"/>
    </linearGradient>
    <linearGradient id="gold" x1="60" y1="86" x2="196" y2="162" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#A87C3D"/>
      <stop offset="0.45" stop-color="#F0CF82"/>
      <stop offset="1" stop-color="#8A5F2C"/>
    </linearGradient>
    <linearGradient id="cyan" x1="128" y1="74" x2="128" y2="206" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#63F4FF"/>
      <stop offset="0.48" stop-color="#19D8FF"/>
      <stop offset="1" stop-color="#007CFF"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

