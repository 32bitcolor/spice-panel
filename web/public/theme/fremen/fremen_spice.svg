<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">Fremen blue spice crystal rewards icon</title>
  <desc id="desc">A transparent vector icon showing a centered cluster of blue spice crystals with sacred minimal sci-fi tribal accents.</desc>
  <defs>
    <linearGradient id="crystalA" x1="96" y1="42" x2="154" y2="202" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4ff7ff"/>
      <stop offset="0.45" stop-color="#0984f2"/>
      <stop offset="1" stop-color="#031542"/>
    </linearGradient>
    <linearGradient id="crystalB" x1="41" y1="95" x2="103" y2="213" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#39e9ff"/>
      <stop offset="0.5" stop-color="#0a5ce0"/>
      <stop offset="1" stop-color="#021232"/>
    </linearGradient>
    <linearGradient id="crystalC" x1="157" y1="91" x2="213" y2="207" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4cf2ff"/>
      <stop offset="0.48" stop-color="#0a6ff0"/>
      <stop offset="1" stop-color="#020f2d"/>
    </linearGradient>
    <linearGradient id="glow" x1="52" y1="52" x2="204" y2="228" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#57f6ff" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#0054ff" stop-opacity="0.15"/>
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- transparent background intentionally omitted -->

